<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; min-height: 100dvh;
  background: #f5f0e6;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  user-select: none;
}

.wallet-stage {
  position: relative;
  width: 380px;
  padding-top: 155px;
  overflow: visible;
}

/* ── Reveal toggle ── */
.reveal-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 24px;
  justify-content: center;
}
.reveal-toggle__label {
  font-size: 13px;
  font-weight: 500;
  color: #555;
}
.toggle-track {
  position: relative;
  width: 44px;
  height: 26px;
  border-radius: 13px;
  background: #ddd;
  cursor: pointer;
  transition: background 0.25s ease;
  border: none;
  outline: none;
  flex-shrink: 0;
}
.toggle-track.on {
  background: #1c1c1e;
}
.toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
.toggle-track.on .toggle-thumb {
  transform: translateX(18px);
}

.wallet-stack {
  position: relative;
  width: 380px;
  height: 213px;
  overflow: visible;
}

.wallet-back {
  position: absolute;
  inset: 0;
  z-index: 0;
  border-radius: 28px;
  overflow: hidden;
  background: linear-gradient(135deg, #151517 0%, #1c1c1e 50%, #0f0f11 100%);
  box-shadow:
    0 24px 64px rgba(0,0,0,0.35),
    0 8px 20px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.04),
    inset 0 -2px 4px rgba(0,0,0,0.5);
}
/* Leather texture effect */
.wallet-back::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.3) 0%, transparent 50%);
  pointer-events: none;
}
/* Stitching via SVG child — wraps the full perimeter */
.stitch-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}

.wallet-card {
  position: absolute;
  left: 50%;
  top: 0;
  width: 340px;
  height: 214px;
  border-radius: 24px;
  cursor: pointer;
  transform: translate3d(-50%, var(--y, 0px), 0);
  backface-visibility: hidden;
  transition: transform 0.36s cubic-bezier(0.32, 0.72, 0, 1);
  color: #fff;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}
.wallet-card:hover {
  will-change: transform;
}
.wallet-card--selected {
  transition: transform 0.44s cubic-bezier(0.25, 0.9, 0.25, 1);
  box-shadow: 0 28px 64px rgba(0,0,0,0.45);
  will-change: transform;
}
@media (prefers-reduced-motion: reduce) {
  .wallet-card,
  .wallet-card--selected {
    transition-duration: 0.15s;
    transition-timing-function: ease;
  }
}

.wallet-card__logo {
  position: absolute;
  top: 18px;
  left: 22px;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  pointer-events: none;
}
.wallet-card__logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: left top;
  display: block;
}
.wallet-card--visa .wallet-card__logo img,
.wallet-card--apple-pay .wallet-card__logo img {
  filter: brightness(0) invert(1);
}

/* Mastercard illustration bg */
.mc-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  pointer-events: none;
  border-radius: 24px;
}
.mc-tint {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0.08) 0%,
      rgba(0,0,0,0.0) 40%,
      rgba(10,2,4,0.55) 100%);
  pointer-events: none;
}

/* Cash App glass: frosted backdrop + SVG specular (no displacement — avoids caustic stars) */
.ca-glass-card {
  position: absolute;
  inset: 0;
  border-radius: 24px;
}
.ca-glass-card::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  border-radius: 24px;
  pointer-events: none;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.34),
    inset 0 1px 0 rgba(255,255,255,0.52),
    inset 0 -1px 0 rgba(0,0,0,0.14),
    inset 1px 0 0 rgba(255,255,255,0.08);
}
.ca-glass-card::after {
  content: '';
  position: absolute;
  z-index: -1;
  inset: 0;
  border-radius: 24px;
  overflow: hidden;
  isolation: isolate;
  background:
    linear-gradient(168deg,
      rgba(0, 210, 108, 0.34) 0%,
      rgba(0, 185, 95, 0.26) 12%,
      rgba(0, 160, 82, 0.18) 24%,
      rgba(255,255,255,0.14) 38%,
      rgba(255,255,255,0.05) 50%,
      rgba(255,255,255,0) 58%,
      rgba(0, 40, 20, 0.2) 100%);
  backdrop-filter: blur(16px) saturate(1.45);
  -webkit-backdrop-filter: blur(16px) saturate(1.45);
  filter: url(#ca-glass-filter);
  -webkit-filter: url(#ca-glass-filter);
}
.ca-glass-content {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
}
.ca-glass-content .wallet-card__pan,
.ca-glass-content .wallet-card__label {
  text-shadow: 0 1px 2px rgba(0,0,0,0.25);
}
@media (prefers-reduced-transparency: reduce) {
  .ca-glass-card::after {
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    background: linear-gradient(168deg, rgba(0, 175, 90, 0.2) 0%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0) 55%, rgba(0, 30, 15, 0.1) 100%);
  }
}

/* Visa Onyx card */
.vc-pattern {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.vc-tl {
  position: absolute;
  top: 18px;
  left: 22px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  pointer-events: none;
}
.vc-tier {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
.vc-tr {
  position: absolute;
  top: 16px;
  right: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  pointer-events: none;
}
.vc-onyx-icon {
  width: 20px;
  height: 22px;
}
.vc-onyx-text {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.vc-chip {
  position: absolute;
  left: 22px;
  top: 76px;
  width: 46px;
  height: 36px;
  pointer-events: none;
}
.vc-bottom {
  position: absolute;
  left: 22px;
  bottom: 18px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 5px;
  pointer-events: none;
}
.vc-name {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.6);
}
.vc-bottom .wallet-card__pan {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.85);
}

.wallet-card__bottom {
  position: absolute;
  left: 22px;
  bottom: 18px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  pointer-events: none;
}
.wallet-card__pan {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  font-variant-numeric: tabular-nums;
  color: #fff;
  opacity: 0.92;
  line-height: 1.2;
  white-space: nowrap;
}
.wallet-card__label {
  font-size: 16px;
  font-weight: 600;
  opacity: 0.9;
}

.wallet-front {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 380px;
  height: 132px;
  z-index: 100;
  overflow: hidden;
  pointer-events: none;
  background: linear-gradient(180deg, #1a1a1c 0%, #1c1c1e 45%, #0f0f11 100%);
  box-shadow:
    inset 0 14px 28px rgba(0, 0, 0, 0.42),
    inset 0 -1px 0 rgba(255,255,255,0.03);
  mask: url(#wallet-front-mask);
  mask-type: luminance;
  -webkit-mask: url(#wallet-front-mask);
  -webkit-mask-type: luminance;
}
/* Leather texture + grain */
.wallet-front::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 30% 40%, rgba(255,255,255,0.06) 0%, transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,0.25) 0%, transparent 45%);
  pointer-events: none;
  mask: inherit;
  -webkit-mask: inherit;
}
/* Front stitching via SVG child — traces the arch + pill cutout perimeter */
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <mask
      id="wallet-front-mask"
      maskUnits="userSpaceOnUse"
      maskContentUnits="userSpaceOnUse"
      x="0"
      y="-40"
      width="380"
      height="190">
      <path
        d="M 0,28 Q 0,0 28,0 H 352 Q 380,0 380,28 V 104 A 28 28 0 0 1 352,132 H 28 A 28 28 0 0 1 0,104 L 0,28 Z"
        fill="white" />
      <rect
        x="138.925"
        y="-30.82"
        width="102.15"
        height="48.08"
        rx="24.04"
        ry="24.04"
        fill="black" />
    </mask>
    <!-- Specular-only + soft blur on highlights (no displacement — avoids caustics). -->
    <filter id="ca-glass-filter" x="-12%" y="-12%" width="124%" height="124%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feImage id="ca-glass-spec-img" result="specRaw" x="0%" y="0%" width="100%" height="100%" preserveAspectRatio="none"/>
      <feGaussianBlur in="specRaw" stdDeviation="1.1" result="specSoft"/>
      <feBlend in="SourceGraphic" in2="specSoft" mode="screen"/>
    </filter>
  </defs>
</svg>

<div class="wallet-stage">
  <div class="wallet-stack" id="wallet-stack">
    <div class="wallet-back">
      <!-- Stitching: full perimeter of wallet-back, inset 12px -->
      <svg class="stitch-svg" viewBox="0 0 380 213" fill="none">
        <rect x="12" y="12" width="356" height="189" rx="18" ry="18"
              stroke="rgba(200,180,160,0.18)" stroke-width="1.5"
              stroke-dasharray="6 4" stroke-linecap="round" />
      </svg>
    </div>
    <div class="wallet-front" id="wallet-front">
      <!-- Stitching: full perimeter of wallet-front, detours around pill cutout at top -->
      <svg class="stitch-svg" viewBox="0 0 380 132" fill="none">
        <path d="
          M 12,40
          Q 12,12  40,12
          H 125
          C 125,12  130,30  152,30
          H 228
          C 250,30  255,12  255,12
          H 340
          Q 368,12  368,40
          V 104
          Q 368,120  352,120
          H 28
          Q 12,120  12,104
          Z"
          stroke="rgba(200,180,160,0.18)"
          stroke-width="1.5"
          stroke-dasharray="6 4"
          stroke-linecap="round" />
      </svg>
    </div>
  </div>

  <!-- Reveal toggle -->
  <div class="reveal-toggle">
    <span class="reveal-toggle__label">Reveal full card</span>
    <button class="toggle-track" id="reveal-toggle" aria-pressed="false">
      <span class="toggle-thumb"></span>
    </button>
  </div>
</div>

<script>
const CARDS = [
  { id: 'cash-app', label: 'Cash App', bg: 'linear-gradient(135deg, #0a1f14 0%, #045c2e 38%, #00a344 72%, #00d632 100%)', logo: 'assets/card-logos/cash-app.svg', content: `
    <div class="ca-glass-card">
      <div class="ca-glass-content">
        <div class="wallet-card__logo"><img src="assets/card-logos/cash-app.svg" alt="" width="56" height="56" decoding="async"/></div>
        <div class="wallet-card__bottom"><span class="wallet-card__pan">•••• 6784</span><span class="wallet-card__label">Cash App</span></div>
      </div>
    </div>
  ` },
  { id: 'mastercard', label: 'Mastercard', bg: '#1a0a0e', logo: 'assets/card-logos/mastercard.svg', content: `
    <img class="mc-bg" src="assets/mastercard-bg.jpg" alt="" aria-hidden="true"/>
    <div class="mc-tint"></div>
    <div class="wallet-card__logo"><img src="assets/card-logos/mastercard.svg" alt="" width="56" height="56" decoding="async"/></div>
    <div class="wallet-card__bottom"><span class="wallet-card__pan">•••• 6784</span><span class="wallet-card__label">Mastercard</span></div>
  ` },
  { id: 'apple-pay',  label: 'Apple Pay',  bg: 'linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 60%, #333 100%)', logo: 'assets/card-logos/apple-pay.svg' },
  { id: 'visa', label: 'Visa', bg: '#18191e', logo: 'assets/card-logos/visa.svg', content: `
    <svg class="vc-pattern" viewBox="0 0 340 214" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
      <polygon points="0,0 120,0 80,90" fill="#1e2028"/>
      <polygon points="120,0 220,0 180,70 80,90" fill="#22242e"/>
      <polygon points="220,0 340,0 340,80 260,110 180,70" fill="#1a1c24"/>
      <polygon points="0,0 80,90 0,120" fill="#252830"/>
      <polygon points="80,90 180,70 200,160 60,180" fill="#1c1e27"/>
      <polygon points="180,70 260,110 280,190 200,160" fill="#212330"/>
      <polygon points="260,110 340,80 340,180 280,190" fill="#1e2029"/>
      <polygon points="0,120 60,180 0,214" fill="#20222b"/>
      <polygon points="60,180 200,160 170,214 0,214" fill="#191b22"/>
      <polygon points="200,160 280,190 260,214 170,214" fill="#1d1f28"/>
      <polygon points="280,190 340,180 340,214 260,214" fill="#22252e"/>
      <polygon points="340,0 340,80 300,40" fill="#252830"/>
    </svg>
    <div class="wallet-card__logo">
      <img src="assets/card-logos/visa.svg" alt="Visa" width="56" height="56" decoding="async" style="filter:brightness(0) invert(1);"/>
    </div>
    <div class="vc-tr">
      <svg class="vc-onyx-icon" viewBox="0 0 20 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="10,1 19,6.5 19,15.5 10,21 1,15.5 1,6.5" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.2"/>
        <polygon points="10,1 19,6.5 10,11" fill="rgba(255,255,255,0.12)"/>
        <polygon points="10,11 19,6.5 19,15.5" fill="rgba(255,255,255,0.07)"/>
        <polygon points="10,11 19,15.5 10,21" fill="rgba(255,255,255,0.14)"/>
        <polygon points="10,11 10,21 1,15.5" fill="rgba(255,255,255,0.09)"/>
        <polygon points="1,6.5 10,11 1,15.5" fill="rgba(255,255,255,0.06)"/>
        <polygon points="10,1 1,6.5 10,11" fill="rgba(255,255,255,0.16)"/>
      </svg>
      <span class="vc-onyx-text">onyx</span>
    </div>
    <svg class="vc-chip" viewBox="0 0 46 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="0" y="0" width="46" height="36" rx="6" fill="url(#chip-grad)"/>
      <defs>
        <linearGradient id="chip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#c8c0a8"/>
          <stop offset="50%" stop-color="#e8e0c8"/>
          <stop offset="100%" stop-color="#b0a888"/>
        </linearGradient>
      </defs>
      <line x1="15" y1="0" x2="15" y2="36" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
      <line x1="31" y1="0" x2="31" y2="36" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
      <line x1="0" y1="12" x2="46" y2="12" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
      <line x1="0" y1="24" x2="46" y2="24" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
      <rect x="15" y="12" width="16" height="12" rx="2" fill="rgba(0,0,0,0.12)" stroke="rgba(0,0,0,0.2)" stroke-width="0.5"/>
    </svg>
    <div class="vc-bottom">
      <span class="vc-name">KEVIN LEE</span>
      <span class="wallet-card__pan">•••• 6784</span>
    </div>
  ` },
];

const PEEK = 16;
const BASE_Y = -36;

const walletStackEl = document.getElementById('wallet-stack');
const walletFrontEl = document.getElementById('wallet-front');
const cardEls = [];
let selectedIndex = null;

const PAN_LINE = '•••• 6784';

CARDS.forEach((c, i) => {
  const el = document.createElement('div');
  el.id = `card-${c.id}`;
  el.className = `wallet-card wallet-card--${c.id}`;
  el.setAttribute('data-card', c.id);
  el.style.background = c.bg;
  el.style.zIndex = String(i + 1);
  el.innerHTML = c.content ?? `<div class="wallet-card__logo"><img src="${c.logo}" alt="" width="72" height="40" decoding="async" /></div><div class="wallet-card__bottom"><span class="wallet-card__pan">${PAN_LINE}</span><span class="wallet-card__label">${c.label}</span></div>`;
  walletStackEl.insertBefore(el, walletFrontEl);
  cardEls.push(el);

  el.addEventListener('click', e => {
    e.stopPropagation();
    selectedIndex = selectedIndex === i ? null : i;
    layout();
  });
});

const STACK_H = 213;
const FRONT_H = 132;
const POCKET_TOP = STACK_H - FRONT_H;   // 81px — where leather starts
const CARD_H = 214;
const SELECTED_CARD_TOP      = -(CARD_H - POCKET_TOP + 10);  // -143: just clears pocket
const SELECTED_CARD_TOP_FULL = -(CARD_H + 60);               // -274: fully lifted, card floating free

let revealFull = false;

function layout() {
  cardEls.forEach((el, i) => {
    const idleY = BASE_Y - (CARDS.length - 1 - i) * PEEK;
    el.style.zIndex = String(i + 1);

    if (selectedIndex !== null && i === selectedIndex) {
      const targetY = revealFull ? SELECTED_CARD_TOP_FULL : SELECTED_CARD_TOP;
      el.style.setProperty('--y', targetY + 'px');
    } else {
      el.style.setProperty('--y', idleY + 'px');
    }

    el.classList.toggle('wallet-card--selected', selectedIndex === i);
  });
}

const toggleBtn = document.getElementById('reveal-toggle');
toggleBtn.addEventListener('click', e => {
  e.stopPropagation();
  revealFull = !revealFull;
  toggleBtn.classList.toggle('on', revealFull);
  toggleBtn.setAttribute('aria-pressed', String(revealFull));
  layout();
});

document.addEventListener('click', () => {
  if (selectedIndex !== null) { selectedIndex = null; layout(); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && selectedIndex !== null) { selectedIndex = null; layout(); }
});

/** Canvas → specular + micro-noise for frosted glass (no displacement). */
function initLiquidGlass() {
  const size = 512;
  const specCanvas = document.createElement('canvas');
  specCanvas.width = specCanvas.height = size;
  const sctx = specCanvas.getContext('2d');
  sctx.fillStyle = 'rgba(0,0,0,0)';
  sctx.fillRect(0, 0, size, size);

  const g1 = sctx.createLinearGradient(0, 0, size * 0.9, size * 0.42);
  g1.addColorStop(0, 'rgba(255,255,255,0.5)');
  g1.addColorStop(0.28, 'rgba(255,255,255,0.12)');
  g1.addColorStop(0.5, 'rgba(255,255,255,0.02)');
  g1.addColorStop(1, 'rgba(255,255,255,0)');
  sctx.fillStyle = g1;
  sctx.fillRect(0, 0, size, size);

  const g2 = sctx.createLinearGradient(size, 0, size * 0.15, size * 0.92);
  g2.addColorStop(0, 'rgba(255,255,255,0.18)');
  g2.addColorStop(0.35, 'rgba(255,255,255,0)');
  sctx.globalCompositeOperation = 'screen';
  sctx.fillStyle = g2;
  sctx.fillRect(0, 0, size, size);

  const cx = size * 0.58;
  const cy = size * 0.26;
  const rg = sctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.52);
  rg.addColorStop(0, 'rgba(255,255,255,0.32)');
  rg.addColorStop(0.4, 'rgba(255,255,255,0.07)');
  rg.addColorStop(1, 'rgba(255,255,255,0)');
  sctx.globalCompositeOperation = 'source-over';
  sctx.fillStyle = rg;
  sctx.fillRect(0, 0, size, size);

  const bx = size * 0.22;
  const by = size * 0.78;
  const bottomGlow = sctx.createRadialGradient(bx, by, 0, bx, by, size * 0.42);
  bottomGlow.addColorStop(0, 'rgba(255,255,255,0.1)');
  bottomGlow.addColorStop(0.55, 'rgba(255,255,255,0.02)');
  bottomGlow.addColorStop(1, 'rgba(255,255,255,0)');
  sctx.fillStyle = bottomGlow;
  sctx.fillRect(0, 0, size, size);

  sctx.globalCompositeOperation = 'overlay';
  sctx.fillStyle = 'rgba(120, 230, 175, 0.095)';
  sctx.fillRect(0, 0, size, size);

  sctx.globalCompositeOperation = 'soft-light';
  sctx.fillStyle = 'rgba(255,255,255,0.04)';
  sctx.fillRect(0, 0, size, size);

  const grain = sctx.createImageData(128, 128);
  for (let i = 0; i < grain.data.length; i += 4) {
    const n = Math.random() * 255;
    grain.data[i] = grain.data[i + 1] = grain.data[i + 2] = n;
    grain.data[i + 3] = Math.random() * 22 + 6;
  }
  const grainCv = document.createElement('canvas');
  grainCv.width = grainCv.height = 128;
  grainCv.getContext('2d').putImageData(grain, 0, 0);
  sctx.globalCompositeOperation = 'overlay';
  sctx.imageSmoothingEnabled = true;
  sctx.drawImage(grainCv, 0, 0, size, size);

  sctx.globalCompositeOperation = 'destination-in';
  const soften = sctx.createRadialGradient(size, size, 0, size, size, size * 0.72);
  soften.addColorStop(0, 'rgba(255,255,255,0.45)');
  soften.addColorStop(0.28, 'rgba(255,255,255,0.94)');
  soften.addColorStop(1, 'rgba(255,255,255,1)');
  sctx.fillStyle = soften;
  sctx.fillRect(0, 0, size, size);

  const specUrl = specCanvas.toDataURL('image/png');
  const specEl = document.getElementById('ca-glass-spec-img');
  if (specEl) {
    specEl.setAttribute('href', specUrl);
    specEl.setAttributeNS('http://www.w3.org/1999/xlink', 'href', specUrl);
  }
}

initLiquidGlass();
layout();
</script>
</body>
</html>
