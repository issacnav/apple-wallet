<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; min-height: 100dvh;
  background: radial-gradient(ellipse at 50% 60%, #1c1026 0%, #060608 70%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ── iPhone 15 Black ── */
.phone {
  position: relative;
  width: 340px; height: 740px;
  background: linear-gradient(170deg, #2e2e2e 0%, #1a1a1a 40%, #0d0d0d 100%);
  border-radius: 54px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.14),
    inset 0 0 0 1px rgba(255,255,255,0.05),
    0 0 0 1px #000,
    0 40px 100px rgba(0,0,0,0.9),
    0 10px 30px rgba(0,0,0,0.6);
}
.phone::after {
  content: ''; position: absolute; right: -3px; top: 185px;
  width: 3px; height: 78px;
  background: linear-gradient(to right, #2a2a2a, #444);
  border-radius: 0 2px 2px 0;
}
.phone::before {
  content: ''; position: absolute; left: -3px; top: 130px;
  width: 3px; height: 34px;
  background: linear-gradient(to left, #2a2a2a, #444);
  border-radius: 2px 0 0 2px;
  box-shadow: 0 50px 0 #3a3a3a, 0 96px 0 #3a3a3a;
}

.screen {
  position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  background: #0a0a0a;
  border-radius: 46px;
  overflow: hidden;
}

.dynamic-island {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 118px; height: 35px;
  background: #000; border-radius: 22px; z-index: 100;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

.status-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 54px;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 26px 8px; color: #fff; z-index: 50;
}
.status-time { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.status-icons { display: flex; gap: 5px; align-items: center; }

.home-indicator {
  position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
  width: 130px; height: 5px;
  background: rgba(255,255,255,0.22); border-radius: 3px; z-index: 50;
}

.screen-content {
  position: absolute;
  top: 54px; left: 0; right: 0; bottom: 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 0 0;
  overflow: hidden;
}

/* ── Wallet header ── */
.wallet-header {
  width: 100%; display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 24px 14px;
}
.wallet-label {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fff;
}
.wallet-bal {
  text-align: right;
}
.wallet-bal-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.35);
  display: block;
}
.wallet-bal-amount {
  font-size: 16px; font-weight: 700; letter-spacing: -0.3px; color: #fff;
  display: block; margin-top: 1px;
}

/* ── Wallet leather jacket ── */
.wallet-wrap {
  position: relative;
  width: 280px;
  flex-shrink: 0;
  padding-bottom: 22px;
}

/* Leather wallet body — visible below the cards */
.wallet-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: calc(100% - 30px);
  background: url('assets/wallet-back.png') center center / cover no-repeat;
  border-radius: 22px;
  box-shadow:
    0 24px 60px rgba(0,0,0,0.8),
    0 8px 20px rgba(0,0,0,0.5),
    inset 0 0 0 1px rgba(255,255,255,0.07);
  z-index: 0;
}
/* Subtle top rim of wallet */
.wallet-body::before {
  content: ''; position: absolute;
  top: 0; left: 12px; right: 12px; height: 2px;
  background: rgba(255,255,255,0.08); border-radius: 2px;
}

/* ── Card stack ── */
.wallet {
  position: relative; width: 280px;
  flex-shrink: 0; z-index: 1;
  /* height set by JS */
}
.wallet.has-selection { }

/* ── Card wrapper ── */
.cw {
  position: absolute; left: 0; top: 0;
  width: 280px; height: 174px; border-radius: 20px;
  cursor: pointer;
  transform: translateY(var(--ty, 0px));
  transition: transform 0.5s cubic-bezier(0.34, 1.4, 0.64, 1);
  will-change: transform; outline: none;
  filter: drop-shadow(0 14px 30px rgba(0,0,0,0.6));
}
.cw:focus-visible { outline: 2px solid rgba(255,255,255,0.3); outline-offset: 3px; }

/* ── Card face ── */
.card {
  width: 100%; height: 100%; border-radius: 20px;
  position: relative; overflow: hidden;
}
/* Card gloss */
.card::after {
  content: ''; position: absolute; inset: 0; z-index: 20;
  background: linear-gradient(140deg, rgba(255,255,255,0.12) 0%, transparent 45%);
  border-radius: inherit; pointer-events: none;
}

/* ── Card logo top-left ── */
.c-logo-tl {
  position: absolute; left: 18px; top: 18px;
  z-index: 5; display: flex; align-items: center;
}
.c-logo-tl img {
  height: 32px; width: auto; display: block; object-fit: contain;
}

/* Card number */
.c-num {
  position: absolute; bottom: 44px; left: 20px; right: 20px;
  font-size: 13px; font-weight: 500; letter-spacing: 0.2em; z-index: 5;
  color: rgba(255,255,255,0.85);
}

/* Card bottom meta */
.c-meta {
  position: absolute; bottom: 16px; left: 20px;
  z-index: 5;
}
.c-holder {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.c-exp {
  font-size: 9px; font-weight: 500; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.35); margin-top: 2px;
}

/* Card logo bottom-right (network mark) */
.c-logo {
  position: absolute; right: 16px; bottom: 14px;
  z-index: 5;
}
.c-logo img {
  height: 28px; width: auto; display: block;
  object-fit: contain;
}
.c-logo svg { display: block; }

/* NFC icon top-right */
.c-nfc {
  position: absolute; right: 18px; top: 20px; z-index: 5; opacity: 0.55;
}

/* Balance pill — shown when card selected */
.c-balance {
  display: none;
  position: absolute; top: 20px; right: 20px; z-index: 10;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.95);
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 3px 10px;
  backdrop-filter: blur(8px);
}
</style>
</head>
<body>
<div class="phone">
  <div class="screen">
    <div class="dynamic-island"></div>

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
          <rect x="0" y="4" width="3" height="8" rx="1" opacity=".4"/>
          <rect x="4.5" y="2.5" width="3" height="9.5" rx="1" opacity=".65"/>
          <rect x="9" y="0" width="3" height="12" rx="1"/>
          <rect x="13.5" y="0" width="3" height="12" rx="1"/>
        </svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor">
          <path d="M8 8.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/>
          <path d="M8 5.5c1.5 0 2.8.6 3.7 1.5L13 5.7C11.8 4.6 10 4 8 4S4.2 4.6 3 5.7l1.3 1.3C5.2 6.1 6.5 5.5 8 5.5z" opacity=".6"/>
          <path d="M8 2c2.7 0 5.1 1 6.9 2.7L16 3.3A11.3 11.3 0 008 0 11.3 11.3 0 000 3.3l1.3 1.4C2.9 3 5.3 2 8 2z" opacity=".3"/>
        </svg>
        <svg width="26" height="12" viewBox="0 0 26 12" fill="currentColor">
          <rect x=".5" y=".5" width="20" height="11" rx="3.5" stroke="currentColor" stroke-opacity=".35" fill="none"/>
          <rect x="2" y="2" width="16" height="8" rx="2"/>
          <path d="M23 4v4a2 2 0 000-4z" fill-opacity=".4"/>
        </svg>
      </div>
    </div>

    <div class="screen-content">
      <div class="wallet-header">
        <span class="wallet-label">Wallet</span>
        <div class="wallet-bal">
          <span class="wallet-bal-label">Total Balance</span>
          <span class="wallet-bal-amount">$12,480.00</span>
        </div>
      </div>

      <div class="wallet-wrap">
        <div class="wallet-body"></div>
        <div class="wallet" id="wallet"></div>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

<script>
const PEEK = 44, CARD_H = 174;

const NFC_SVG = `<svg class="c-nfc" width="18" height="18" viewBox="0 0 24 24" fill="none">
  <path d="M12.5 4C9 4 6.5 7.5 6.5 12s2.5 8 6 8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M12.5 7.5C10.5 7.5 9 9.5 9 12s1.5 4.5 3.5 4.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M12.5 11c-.5 0-1 .4-1 1s.5 1 1 1" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>`;

/* Apple Pay logo — Apple mark + Pay wordmark */
const APPLEPAY_SVG = `<svg width="72" height="30" viewBox="0 0 72 30" fill="none">
  <path d="M13.2 6.1c-.9 1.1-2.3 1.9-3.7 1.8-.2-1.4.5-2.9 1.3-3.8C11.7 3 13.2 2.2 14.5 2c.2 1.5-.4 2.9-1.3 4.1z" fill="white"/>
  <path d="M14.5 8c-2-.1-3.7 1.1-4.6 1.1-.9 0-2.4-1-3.9-1-2 0-3.9 1.2-4.9 3-2.1 3.6-.5 9 1.5 11.9 1 1.4 2.2 3 3.7 2.9 1.5-.1 2-.9 3.8-.9 1.7 0 2.2.9 3.8.9 1.6 0 2.6-1.4 3.6-2.9.7-1 1-1.5 1.5-2.6-4-.2-4.6-5.9-.6-7.7-.9-1.4-2.4-2.7-3.9-2.7z" fill="white"/>
  <text x="22" y="21" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="14" font-weight="600" fill="white" letter-spacing="-0.2">Pay</text>
</svg>`;

/* CashApp — green square icon + wordmark */
const CASHAPP_SVG = `<svg width="90" height="32" viewBox="0 0 90 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#00D632"/>
  <path d="M18.2 7.5l-.8-.3a6.8 6.8 0 00-7 3.2c-1 1.8-.6 4 .7 5.2l1 .9c.9.8.5 2-.6 2.1h-.2c-.8 0-1.6-.3-2.2-.8l-.9 1.7c.9.7 2 1.1 3.1 1h.1l-.3 1.4h2l.3-1.5c1.6-.3 3-1.4 3.5-2.9.7-1.9-.1-3.7-1.7-4.7l-1-.8c-.7-.6-.5-1.7.4-1.9.7-.2 1.5 0 2 .5l1-1.5-.4-.1z" fill="white"/>
  <text x="40" y="22" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="-0.3">Cash</text>
</svg>`;

const CARDS = [
  {
    id: 'cashapp', title: 'Cash App', zIndex: 1,
    gradient: 'linear-gradient(135deg, #050505 0%, #0d0d0d 60%, #111 100%)',
    pattern: `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 280 174" preserveAspectRatio="xMidYMid slice">
      <circle cx="240" cy="30" r="100" fill="rgba(0,214,50,0.05)"/>
      <circle cx="20" cy="160" r="80" fill="rgba(0,214,50,0.03)"/>
    </svg>`,
    logoTopLeft: CASHAPP_SVG,
    number: '3636', holder: 'Alex Johnson', expiry: '06/29',
    balance: '$1,920.00', hasNfc: false,
  },
  {
    id: 'paypal', title: 'PayPal', zIndex: 2,
    gradient: 'linear-gradient(135deg, #001a4e 0%, #003087 50%, #0070ba 100%)',
    pattern: `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 280 174" preserveAspectRatio="xMidYMid slice">
      <circle cx="-10" cy="87" r="160" fill="rgba(255,255,255,0.04)"/>
      <circle cx="60" cy="-40" r="120" fill="rgba(255,255,255,0.03)"/>
    </svg>`,
    logoTopLeftImg: 'assets/logo-paypal.png', logoH: 28,
    number: '7890', holder: 'Alex Johnson', expiry: '03/28',
    balance: '$1,510.00', hasNfc: true,
  },
  {
    id: 'visa', title: 'Visa Debit', zIndex: 3,
    gradient: 'linear-gradient(135deg, #0b1d3a 0%, #1345a0 55%, #1565c0 100%)',
    pattern: `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 280 174" preserveAspectRatio="xMidYMid slice">
      <circle cx="230" cy="-30" r="150" fill="rgba(255,255,255,0.04)"/>
      <circle cx="270" cy="200" r="120" fill="rgba(255,255,255,0.04)"/>
    </svg>`,
    logoTopLeftImg: 'assets/logo-visa.png', logoH: 26,
    number: '4242', holder: 'Alex Johnson', expiry: '09/28',
    balance: '$5,240.00', hasNfc: true,
  },
  {
    id: 'applepay', title: 'Apple Pay', zIndex: 4,
    gradient: 'linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 60%, #222 100%)',
    pattern: `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 280 174" preserveAspectRatio="xMidYMid slice">
      <circle cx="240" cy="-20" r="140" fill="rgba(255,255,255,0.03)"/>
      <circle cx="-10" cy="180" r="120" fill="rgba(255,255,255,0.02)"/>
    </svg>`,
    logoTopLeft: APPLEPAY_SVG,
    number: '1234', holder: 'Alex Johnson', expiry: '11/29',
    balance: '$3,810.00', hasNfc: true,
  },
];

CARDS.forEach((c, i) => { c.ty = i * PEEK; });

const walletEl = document.getElementById('wallet');
const wrapEl   = walletEl.closest('.wallet-wrap');
const wrappers = [];
let selectedIndex = null;

function getDefaultH() { return CARD_H + (CARDS.length - 1) * PEEK; }
function getExpandedH() { return CARD_H + 18 + (CARDS.length - 1) * 36; }

walletEl.style.height = getDefaultH() + 'px';
wrapEl.style.height = (getDefaultH() + 22) + 'px';

function applySelection() {
  const hasSel = selectedIndex !== null;
  walletEl.classList.toggle('has-selection', hasSel);
  const h = hasSel ? getExpandedH() : getDefaultH();
  walletEl.style.height = h + 'px';
  wrapEl.style.height = (h + 22) + 'px';

  const peers = hasSel ? CARDS.map((_, j) => j).filter(j => j !== selectedIndex) : [];
  wrappers.forEach((wrap, i) => {
    if (!hasSel) {
      wrap.style.setProperty('--ty', CARDS[i].ty + 'px');
      wrap.style.zIndex = CARDS[i].zIndex;
    } else if (i === selectedIndex) {
      wrap.style.setProperty('--ty', '0px');
      wrap.style.zIndex = 50;
    } else {
      const slot = peers.indexOf(i);
      wrap.style.setProperty('--ty', (CARD_H + 18 + slot * 36) + 'px');
      wrap.style.zIndex = slot + 1;
    }
  });
}

CARDS.forEach((c, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'cw';
  wrap.style.setProperty('--ty', c.ty + 'px');
  wrap.style.zIndex = c.zIndex;
  wrap.setAttribute('role', 'button');
  wrap.setAttribute('tabindex', '0');
  wrap.setAttribute('aria-label', c.title);

  const card = document.createElement('div');
  card.className = 'card';
  card.style.background = c.gradient;

  let html = c.pattern || '';

  /* Logo — top left */
  if (c.logoTopLeft) {
    html += `<div class="c-logo-tl">${c.logoTopLeft}</div>`;
  } else if (c.logoTopLeftImg) {
    html += `<div class="c-logo-tl"><img src="${c.logoTopLeftImg}" style="height:${c.logoH}px" alt="${c.title}"></div>`;
  }

  /* NFC — top right */
  if (c.hasNfc) html += NFC_SVG;

  /* Card number */
  html += `<div class="c-num">•••• &nbsp; •••• &nbsp; •••• &nbsp; ${c.number}</div>`;

  /* Bottom left: holder + expiry */
  html += `<div class="c-meta">
    <div class="c-holder">${c.holder}</div>
    <div class="c-exp">${c.expiry}</div>
  </div>`;

  /* Balance badge */
  html += `<div class="c-balance">${c.balance}</div>`;

  card.innerHTML = html;
  wrap.appendChild(card);
  walletEl.appendChild(wrap);
  wrappers.push(wrap);

  function toggle() {
    selectedIndex = (selectedIndex === i) ? null : i;
    wrappers.forEach((w, j) => {
      const b = w.querySelector('.c-balance');
      if (b) b.style.display = (selectedIndex === j) ? 'block' : 'none';
    });
    applySelection();
  }

  wrap.addEventListener('click', e => { e.stopPropagation(); toggle(); });
  wrap.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });
});

document.addEventListener('pointerdown', e => {
  if (selectedIndex === null) return;
  if (e.target.closest('.cw')) return;
  wrappers.forEach(w => { const b = w.querySelector('.c-balance'); if (b) b.style.display = 'none'; });
  selectedIndex = null; applySelection();
}, true);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    wrappers.forEach(w => { const b = w.querySelector('.c-balance'); if (b) b.style.display = 'none'; });
    selectedIndex = null; applySelection();
  }
});
</script>
</body>
</html>
